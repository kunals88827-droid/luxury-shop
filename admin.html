<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#111;color:white;padding:20px;}
input{padding:10px;margin:5px;}
button{padding:10px;background:gold;border:none;cursor:pointer;}
.card{background:#222;padding:10px;margin:10px 0;border-radius:10px;}
img{width:100px;height:100px;object-fit:cover;}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input type="file" id="image">

<button onclick="add()">Add Product</button>

<div id="list"></div>

<script>

async function loadProducts(){
  let res = await fetch("http://localhost:5000/products");
  let data = await res.json();

  let html = "";

  data.forEach(p=>{
    html += `
      <div class="card">
        <img src="http://localhost:5000/uploads/${p.image}" 
             onerror="this.src='https://via.placeholder.com/100'">

        <h3>${p.name}</h3>
        <p>?${p.price}</p>

        <button onclick="del(${p.id})">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// ADD PRODUCT
async function add(){
  let formData = new FormData();

  formData.append("name", document.getElementById("name").value);
  formData.append("price", document.getElementById("price").value);
  formData.append("image", document.getElementById("image").files[0]);

  await fetch("http://localhost:5000/add-product", {
    method: "POST",
    body: formData
  });

  alert("Added ?");

  loadProducts(); // ?? auto refresh
}

// DELETE PRODUCT
async function del(id){
  await fetch(`http://localhost:5000/delete-product/${id}`, {
    method: "DELETE"
  });

  alert("Deleted ?");

  loadProducts(); // ?? refresh again
}

// PAGE LOAD PE PRODUCTS DIKHAO
loadProducts();

</script>

</body>
</html>
