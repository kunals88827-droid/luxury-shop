<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: black;
      color: white;
      align-items: center;
    }

    .top-bar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    #cartItems {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }

    .qty-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .qty-btn {
      padding: 5px 10px;
      font-size: 16px;
      background: black;
      color:white;
    }

    .qty {
      font-weight: bold;
      font-size: 18px;
    }

    button {
      padding: 10px;
      border: none;
      background: linear-gradient(45deg, red, darkred);
      color: white;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .bottom {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 15px;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .checkout {
      background: green;
    }

    .checkout:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <div>?? Your Cart</div>
  <a href="index.html">? Back to Shop</a>
</div>

<h1>Shopping Cart</h1>

<div id="cartItems"></div>

<div class="bottom">
  <h2 id="total">Total: ?0</h2>
  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>
function loadCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let html = "";
  let total = 0;

  if (cart.length === 0) {
    html = "<h2 style='text-align:center;'>Cart is empty ??</h2>";
  }

  cart.forEach((item, index) => {

    if (!item.qty) item.qty = 1;

    let itemTotal = item.qty * Number(item.price);
    total += itemTotal;

    html += `
      <div class="card">
        <img src="http://localhost:5000/uploads/${item.image}" 
             onerror="this.src='https://via.placeholder.com/150'"/>

        <h3>${item.name}</h3>
        <div class="price">?${item.price}</div>

        <div class="qty-box">
          <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
          <div class="qty">${item.qty}</div>
          <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
        </div>

        <div>Subtotal: ?${itemTotal}</div>

        <button onclick="removeItem(${index})">Remove ?</button>
      </div>
    `;
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "Total: ?" + total;
}

// ?? QTY CHANGE
function changeQty(index, change) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart[index].qty = (cart[index].qty || 1) + change;

  if (cart[index].qty <= 0) {
    cart.splice(index, 1);
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

// ? REMOVE ITEM
function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.splice(index, 1);

  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

// ?? CHECKOUT REDIRECT
function checkout() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  window.location.href = "checkout.html";
}

// INIT
loadCart();
</script>

</body>
</html>
